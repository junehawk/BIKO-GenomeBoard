# PM1 Hotspot Overrides — clinical-advisor curated layer
# Layered on top of the programmatic cancerhotspots v2 + ClinGen VCEP merge
# performed by scripts/db/build_pm1_hotspots.py.
#
# Precedence order (highest wins):
#   1. This YAML (clinical-advisor clinical locks)
#   2. ClinGen VCEP PM1 lists (TP53 v2.0, BRCA1/2 ENIGMA, PTEN, MLH1/MSH2 InSiGHT)
#   3. cancerhotspots v2 TSV (data/db/hotspots/hotspots_v2_single.tsv)
#
# Schema (consumed by build_pm1_hotspots.py → emits data/pm1_hotspot_domains.json):
#   additions:
#     <gene>:
#       - range: [start, end]        # protein-residue range, inclusive
#         domain: <str>              # human-readable domain label
#         strength: moderate|supporting
#         source: "PMID <id>"        # MUST match r"PMID \d+"
#         rationale: <str>           # one-liner for audit
#         locked: true|false         # true = clinical lock, cannot be silently downgraded
#   exclusions:
#     <gene>:
#       - range: [start, end]
#         reason: <str>              # why this residue is excluded from PM1
#
# Reviewed: 2026-04-14 by clinical-advisor
# Plan ref: docs/superpowers/plans/2026-04-14-ai-board-v2.2.md §A3
# Review ref: _workspace/v22-phaseA/artifacts/00_clinical_review.md §1

version: "1.0"
review_date: "2026-04-14"
reviewer: "clinical-advisor"

additions:

  # ==========================================================================
  # TP53 — DBD hotspot block (clinical lock)
  # ==========================================================================
  # The TP53 DBD block is the single most load-bearing PM1 region for cancer
  # somatic interpretation. 245-249 is explicitly locked at moderate strength
  # per clinical decision #4 in the v2.2 Review Integration Log.
  TP53:
    - range: [175, 175]
      domain: "DBD β-sandwich (R175 structural hotspot)"
      strength: moderate
      source: "PMID 30224644"
      rationale: "Giacomelli 2018 Fig 2 top-5 LOF; IARC TP53 r20 top-5 somatic; ClinGen TP53 VCEP v2.0 PM1 list"
      locked: true

    - range: [245, 249]
      domain: "DBD L3 loop (aa 245-254)"
      strength: moderate
      source: "PMID 30224644"
      rationale: "L3 loop is the single most mutation-dense contiguous functional block in TP53 (Giacomelli 2018 Fig 2). IARC TP53 r20: R248 #1, R249 #2 somatic hotspots genome-wide. R245/246/247 loss-of-function scores uniformly top-decile. Downgrading 246-248 because they flank R249 would be arbitrary and inconsistent with Garrett 2021 ClinGen SVI block-level assignment."
      locked: true  # CLINICAL LOCK — do not downgrade without clinical-advisor re-review

    - range: [273, 273]
      domain: "DBD DNA-contact surface (R273)"
      strength: moderate
      source: "PMID 30224644"
      rationale: "Top-5 IARC r20 somatic; ClinGen TP53 VCEP v2.0 PM1; Giacomelli Fig 2 top-decile LOF"
      locked: true

    - range: [282, 282]
      domain: "DBD L3 loop-adjacent (R282)"
      strength: moderate
      source: "PMID 30224644"
      rationale: "Top-10 IARC r20 somatic; ClinGen TP53 VCEP v2.0 PM1"
      locked: true

  # ==========================================================================
  # KRAS — G-domain hotspots
  # ==========================================================================
  KRAS:
    - range: [12, 13]
      domain: "G-domain P-loop / switch I"
      strength: moderate
      source: "PMID 27993330"
      rationale: "OncoKB Level 1 (CRC, NSCLC, PDAC); COSMIC v99 #1 hotspot; AMP/ASCO/CAP 2017 canonical Tier I example"
      locked: true

    - range: [61, 61]
      domain: "G-domain switch II"
      strength: moderate
      source: "PMID 27993330"
      rationale: "OncoKB Level 1; COSMIC v99 top hotspot"
      locked: true

    - range: [117, 117]
      domain: "G-domain nucleotide binding"
      strength: supporting  # intentional downgrade
      source: "PMID 27993330"
      rationale: "Recurrent but OncoKB Level 3A only; functional data thinner than 12/13/61 — conservative supporting"
      locked: false

    - range: [146, 146]
      domain: "G-domain nucleotide binding"
      strength: supporting
      source: "PMID 27993330"
      rationale: "Recurrent but OncoKB Level 3A only; conservative supporting"
      locked: false

  # ==========================================================================
  # NRAS — G-domain hotspots
  # ==========================================================================
  NRAS:
    - range: [12, 13]
      domain: "G-domain P-loop / switch I"
      strength: moderate
      source: "PMID 27993330"
      rationale: "OncoKB Level 1 (melanoma, AML); COSMIC v99 top hotspot"
      locked: true
    - range: [61, 61]
      domain: "G-domain switch II"
      strength: moderate
      source: "PMID 27993330"
      rationale: "OncoKB Level 1 (melanoma Q61); COSMIC v99 top hotspot"
      locked: true

  # ==========================================================================
  # HRAS — G-domain hotspots
  # ==========================================================================
  HRAS:
    - range: [12, 13]
      domain: "G-domain P-loop / switch I"
      strength: moderate
      source: "PMID 27993330"
      rationale: "OncoKB Level 1 (HNSCC, thyroid); COSMIC v99"
      locked: true
    - range: [61, 61]
      domain: "G-domain switch II"
      strength: moderate
      source: "PMID 27993330"
      rationale: "OncoKB Level 1; COSMIC v99"
      locked: true

  # ==========================================================================
  # BRAF — kinase activation loop
  # ==========================================================================
  BRAF:
    - range: [600, 600]
      domain: "Kinase activation loop (V600)"
      strength: moderate
      source: "PMID 27993330"
      rationale: "OncoKB Level 1 (V600E — melanoma, CRC, HCL, NSCLC); AMP/ASCO/CAP 2017 canonical Tier I example; COSMIC v99 top hotspot"
      locked: true
    - range: [601, 601]
      domain: "Kinase activation loop (adjacent to V600)"
      strength: supporting  # intentional downgrade
      source: "PMID 27993330"
      rationale: "Recurrent but OncoKB Level 3A only; avoid conflation with V600E dominant hotspot"
      locked: false

  # ==========================================================================
  # PIK3CA — helical + kinase domains
  # ==========================================================================
  PIK3CA:
    - range: [542, 542]
      domain: "Helical domain (E542)"
      strength: moderate
      source: "PMID 27993330"
      rationale: "OncoKB Level 1 (breast, alpelisib); COSMIC v99 top hotspot"
      locked: true
    - range: [545, 545]
      domain: "Helical domain (E545)"
      strength: moderate
      source: "PMID 27993330"
      rationale: "OncoKB Level 1; COSMIC v99 top hotspot"
      locked: true
    - range: [1047, 1047]
      domain: "Kinase domain (H1047)"
      strength: moderate
      source: "PMID 27993330"
      rationale: "OncoKB Level 1 (breast alpelisib); COSMIC v99 top hotspot"
      locked: true

  # ==========================================================================
  # EGFR — TKI-sensitising hotspots
  # ==========================================================================
  EGFR:
    - range: [719, 719]
      domain: "ATP-binding P-loop (G719)"
      strength: moderate
      source: "PMID 27993330"
      rationale: "OncoKB Level 1 (NSCLC afatinib); COSMIC v99"
      locked: true
    - range: [746, 750]
      domain: "Exon 19 deletion region"
      strength: moderate
      source: "PMID 27993330"
      rationale: "OncoKB Level 1 (NSCLC EGFR-TKI); AMP/ASCO/CAP 2017 canonical Tier I"
      locked: true
    - range: [790, 790]
      domain: "Gatekeeper T790M (resistance)"
      strength: moderate
      source: "PMID 27993330"
      rationale: "OncoKB Level 1 (osimertinib); COSMIC v99; known TKI-resistance hotspot"
      locked: true
    - range: [858, 858]
      domain: "Activation loop (L858R)"
      strength: moderate
      source: "PMID 27993330"
      rationale: "OncoKB Level 1; COSMIC v99 top hotspot; AMP/ASCO/CAP 2017 canonical"
      locked: true
    - range: [861, 861]
      domain: "Activation loop (L861Q)"
      strength: supporting  # intentional downgrade
      source: "PMID 27993330"
      rationale: "OncoKB Level 1 afatinib but COSMIC recurrence ~10× below L858R — conservative supporting"
      locked: false

  # ==========================================================================
  # IDH1 / IDH2 — active-site hotspots
  # ==========================================================================
  IDH1:
    - range: [132, 132]
      domain: "Active site (R132)"
      strength: moderate
      source: "PMID 27993330"
      rationale: "OncoKB Level 1 (AML ivosidenib; cholangiocarcinoma); COSMIC v99 top hotspot"
      locked: true

  IDH2:
    - range: [140, 140]
      domain: "Active site (R140)"
      strength: moderate
      source: "PMID 27993330"
      rationale: "OncoKB Level 1 (AML enasidenib); COSMIC v99 top hotspot"
      locked: true
    - range: [172, 172]
      domain: "Active site (R172)"
      strength: supporting  # intentional downgrade
      source: "PMID 27993330"
      rationale: "OncoKB Level 2/3A; functional data and therapeutic evidence thinner than R140"
      locked: false

# ============================================================================
# Exclusions — residues the programmatic merge might include but clinical-advisor
# removes. Empty for v2.2 initial release.
# ============================================================================
exclusions:
  # Example format:
  # TP53:
  #   - range: [337, 337]
  #     reason: "R337H is a founder variant in Brazilian LFS cohorts — PM1 would double-count with founder-variant PP1 logic; handle separately"
  #
  # No exclusions for v2.2.

# ============================================================================
# Change log
# ============================================================================
changelog:
  - date: "2026-04-14"
    version: "1.0"
    author: "clinical-advisor"
    changes: "Initial v2.2 release. TP53 DBD block explicit (175, 245-249, 273, 282 all moderate, locked). KRAS/NRAS/HRAS/BRAF/PIK3CA/EGFR/IDH1/IDH2 hotspots added. KRAS 117/146, BRAF 601, EGFR 861, IDH2 172 intentionally downgraded to supporting. No exclusions."
