[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = [
    "E501",  # line too long (we set 120 but some lines are unavoidable)
    "F841",  # local variable assigned but never used (sometimes intentional)
    "W605",  # invalid escape sequence (some regex patterns)
]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
check_untyped_defs = false  # gradual start — tighten in refactor round 3
warn_unused_ignores = true
files = ["scripts/", "tests/"]
exclude = [
    "scripts/tools/",  # one-off build utilities, not core pipeline
]

[[tool.mypy.overrides]]
module = "pysam.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "cyvcf2.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "weasyprint.*"
ignore_missing_imports = true

[tool.pytest.ini_options]
markers = [
    "unit: fast unit tests with no external dependencies",
    "integration: require local DBs, subprocesses, or network (excluded by CI -k 'not integration')",
    "e2e: full orchestrate.py end-to-end pipeline",
    "slow: runs longer than 5 seconds",
    "llm: require a running Ollama server",
]

[tool.coverage.run]
source = ["scripts"]
omit = [
    "scripts/tools/*",
    "tests/*",
]

[tool.coverage.report]
show_missing = true
precision = 1
skip_empty = true
