name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Force JavaScript actions (actions/checkout@v4, actions/setup-python@v5)
# to run on Node.js 24 instead of the deprecated Node.js 20 runtime.
# Node.js 20 will be removed from the runner on 2026-09-16; opting in now
# silences the per-run deprecation warnings and future-proofs the pipeline.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check scripts/ tests/
      - run: ruff format --check scripts/ tests/

  type-check:
    # Gradual mypy adoption (v2.4 refactor round 2, Phase 3). Runs in
    # advisory mode — error count is tracked against the baseline in
    # _workspace/v24-refactor-round2/mypy_baseline.txt. Promotion to a
    # hard gate is deferred to refactor round 3 once check_untyped_defs
    # flips to true.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install mypy + runtime deps
        run: |
          pip install mypy
          pip install -r requirements.txt
      - name: Run mypy (advisory)
        run: mypy scripts/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run tests (skip external API calls)
        run: python -m pytest tests/ -v --tb=short -k "not integration"
        env:
          GB_SKIP_API: "true"

  coverage:
    # Baseline coverage is observational (v2.4 refactor round 2, Phase 4.4).
    # No threshold is enforced in this round; the numbers are logged so
    # round 3 can set a target against a known starting point. Runs in
    # advisory mode so coverage drift never blocks a merge.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run tests with coverage (advisory, no threshold)
        run: python -m pytest tests/ -q -k "not integration" --cov=scripts --cov-report=term
        env:
          GB_SKIP_API: "true"

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python scripts/orchestrate.py --help
      - name: Generate report (offline mode)
        run: python scripts/orchestrate.py data/sample_vcf/demo_variants_grch38.vcf --skip-api -o /tmp/test_report.html
      - name: Verify report generated
        run: test -s /tmp/test_report.html
