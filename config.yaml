# BIKO GenomeBoard Configuration

# Docker paths (when running in container):
# paths.krgdb: /app/data/krgdb_freq.tsv
# paths.clinvar_db: /app/data/db/clinvar.sqlite3
# paths.gnomad_db: /app/data/db/gnomad.sqlite3
# cache.path: /app/data/cache/variant_cache.sqlite3
paths:
  krgdb: "data/krgdb_freq.tsv"
  gene_knowledge: "data/gene_knowledge.json"
  pgx_table: "data/korean_pgx_table.json"
  acmg_rules: "data/acmg_rules.json"
  templates: "templates"
  clinvar_db: "data/db/clinvar.sqlite3"
  gnomad_db: "data/db/gnomad.sqlite3"
  gnomad_vcf_dir: "data/db/gnomad_vcf"
  oncokb_genes: "data/oncokb_cancer_genes.json"
  civic_db: "data/db/civic.sqlite3"
  hpo_db: "data/db/hpo.sqlite3"
  hpo_annotation: "data/db/genes_to_phenotype.txt"
  clingen_db: "data/db/clingen.sqlite3"
  orphanet_db: "data/db/orphanet.sqlite3"
  genreviews_db: "data/db/genreviews.sqlite3"
  omim_mapping_db: "data/db/omim_mapping.sqlite3"
  omim_genemap_db: "data/db/omim_genemap.sqlite3"
  korea4k_freq: "data/korea4k_freq.tsv"
  nard2_freq: "data/nard2_freq.tsv"
  pm1_hotspots_json: "data/pm1_hotspot_domains.json"
  pm1_hotspots_overrides: "data/pm1_hotspot_overrides.yaml"
  cancerhotspots_tsv: "data/db/hotspots/hotspots_v2_single.tsv"
  gnomad_constraint_db: "data/db/gnomad_constraint.sqlite3"

thresholds:
  ba1: 0.05      # Stand-alone benign (>5%)
  bs1: 0.01      # Strong benign (>=1%)
  pm2: 0.001     # PM2_Supporting (<=0.1%)

api:
  clinvar_esearch: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi"
  clinvar_esummary: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esummary.fcgi"
  gnomad: "https://gnomad.broadinstitute.org/api"
  gnomad_datasets: ["gnomad_r4", "gnomad_r2_1"]
  pharmgkb: "https://api.pharmgkb.org/v1/data"
  ncbi_api_key: ""  # Override with NCBI_API_KEY env var
  timeout: 30
  max_retries: 3
  backoff_base: 1.0
  pharmgkb_rate_limit: 0.5

annotation:
  source: "auto"  # "local" (SQLite only), "api" (HTTP only), "auto" (local first, API fallback)

report:
  default_mode: "cancer"
  default_genome_build: "GRCh38"
  font_url: "https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"

pgx:
  genes: ["CYP2D6", "CYP2C19", "CYP2C9", "HLA-B", "HLA-A", "NUDT15", "TPMT", "DPYD", "CYP3A5", "UGT1A1", "SLCO1B1", "VKORC1", "CYP1A2", "G6PD", "IFNL3"]
  risk_factor_genes: ["APOE"]

acmg:
  # A4: narrow ClinVar-conflict reconciliation gate. When true, engine-earned
  # LP/P is preserved against a ClinVar "Conflicting" status iff PM1 (from the
  # A3 hotspot table) AND PM5 both fire. Flip to false to fully defer to
  # ClinVar without touching logic. See _workspace/v22-phaseA/artifacts/
  # 00_clinical_review.md §5 for rollback criteria.
  allow_engine_override_on_conflict: true

somatic:
  tiering_strategy: "B"  # "A" (CIViC priority), "B" (combined), "C" (OncoKB only)
  tmb_high_threshold: 10
  tmb_intermediate_threshold: 6
  tmb_default_panel_size_mb: 33.0
  tmb_counted_consequences:
    - missense_variant
    - stop_gained
    - frameshift_variant
    - splice_donor_variant
    - splice_acceptor_variant
    - inframe_deletion
    - inframe_insertion

in_silico:
  pp3:
    revel_moderate: 0.644
    revel_strong: 0.932
    spliceai_moderate: 0.2
    spliceai_strong: 0.5
  bp4:
    revel_moderate: 0.183
    revel_strong: 0.016
    spliceai_benign: 0.1

cache:
  enabled: true
  path: "data/cache/variant_cache.sqlite3"
  ttl_seconds: 604800  # 7 days

clinical_board:
  enabled: false
  # v2.2 curated treatments (OncoKB + CIViC curator)
  curated_treatments:
    oncokb_base_url: "https://www.oncokb.org/api/v1"
    http_timeout_s: 5.0
    offline_mode: false        # when true, skip OncoKB API → CIViC-only degradation
    cache_namespace: "oncokb"  # stored in variant_cache.sqlite3 via set_cached_ns/get_cached_ns
  ollama_url: "http://localhost:11434"
  agent_model: "alibayram/medgemma:27b"
  chair_model: "supergemma4-31b"
  timeout: 300
  max_retries: 1
  language: "en"         # en or ko
  include_in_report: true
  temperature: 0.1
  clinical_note_max_chars: 1500

  # Variant selector — see scripts/clinical_board/variant_selector.py and
  # _workspace/variant-selector/00_clinical_review.md for the clinical rationale.
  variant_selection:
    max_cancer_board_variants: 30          # soft cap — MUST items never truncated
    max_cancer_may_include: 10             # per-class cap on Tier III VUS admissions
    max_rare_disease_board_variants: 20    # soft cap — P/LP never truncated
    max_rare_disease_may_include: 10       # per-class cap on HPO-matched VUS
    # When true, Tier III VUS must satisfy hotspot / OncoKB-oncogenic-in-CGC /
    # TSG-LoF / indel-hotspot. Per AMP 2017 + clinical review this is the
    # only supported mode; the "protein-impacting alone" arm is rejected.
    cancer_vus_requires_driver_gene: true
    rare_disease_vus_max_gnomad_af: 0.01
    # Legacy knob — the top-3 fallback is REJECTED by clinical review
    # (PMID 27993330, 25741868). "No reportable findings" is a legitimate
    # clinical outcome; the selector always emits an empty list with an
    # explicit empty_reason instead of fabricating a top-K.
    fallback_when_empty: false

pharmacogenomics:
  engine: "auto"                 # auto: PharmCAT if available, else builtin | pharmcat | builtin
  pharmcat_jar: ""               # empty = auto-discover from data/tools/pharmcat/pharmcat-*.jar
  java_path: ""                  # empty = system PATH
  reference_fasta: ""            # GRCh38 FASTA for PharmCAT preprocessor (empty = skip preprocessor)
  fallback_to_builtin: true      # when PharmCAT unavailable, fall back to builtin SNV matching

knowledge_base:
  enabled: true
  path: "data/knowledge_base"
  prior_knowledge_max_tokens: 1000
